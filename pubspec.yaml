name: forcetrack_app
description: Real-time gait and pressure analysis from Raspberry Pi sensors.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # WiFi / WebSocket
  web_socket_channel: ^2.4.5

  # Bluetooth BLE
  flutter_blue_plus: ^1.32.12

  # Charts
  fl_chart: ^0.68.0

  # Local storage (sessions)
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
